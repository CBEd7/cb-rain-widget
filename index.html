
<script>
const weatherURL =
"https://api.weather.gov/gridpoints/ILM/64,34/forecast/hourly";

fetch(weatherURL)
.then(response => response.json())
.then(data => {

const periods =
data.properties.periods.slice(0,24);

const rainChances =
periods.map(period =>
period.probabilityOfPrecipitation.value || 0
);

const currentChance =
rainChances[0] || 0;

const highestChance =
Math.max(...rainChances);

document.getElementById("currentRain").innerHTML =
currentChance + "%";

document.getElementById("forecastRain").innerHTML =
highestChance + "%";

let risk = "LOW";
let note = "No major rainfall expected.";
let alertColor = "#e8f5e9";
let alertText = "#1b5e20";

if (highestChance >= 70) {
risk = "HIGH";
note = "High rain chance in the next 24 hours. Monitor Carolina Beach Lake and low-lying ponding locations.";
alertColor = "#ffebee";
alertText = "#b71c1c";
}

else if (highestChance >= 40) {
risk = "MODERATE";
note = "Moderate rain chance. Some ponding may occur in low-lying areas.";
alertColor = "#fff8e1";
alertText = "#8a5a00";
}

document.getElementById("riskLevel").innerHTML = risk;

const alertBox =
document.getElementById("cb-alert");

alertBox.innerHTML = note;
alertBox.style.background = alertColor;
alertBox.style.color = alertText;

})

.catch(error => {

document.getElementById("currentRain").innerHTML =
"Unavailable";

document.getElementById("forecastRain").innerHTML =
"Unavailable";

document.getElementById("riskLevel").innerHTML =
"Unavailable";

document.getElementById("cb-alert").innerHTML =
"NOAA weather data could not load.";

});
</script>
